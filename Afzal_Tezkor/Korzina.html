<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Afzal Tezkor</title>
  <link rel="stylesheet" href="Style.css">
  <style>
    /* ── Корзина ── */
    .korzina-wrap {
      max-width: 680px;
      margin: 32px auto 80px;
      padding: 0 20px;
    }
    .korzina-title {
      font-size: 24px; font-weight: 800;
      margin-bottom: 20px;
    }
    .korzina-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .korzina-empty__icon { font-size: 64px; margin-bottom: 16px; }
    .korzina-empty__text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .korzina-empty__sub  { font-size: 14px; margin-bottom: 24px; }
    .korzina-empty__btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--purple);
      color: white;
      border-radius: 12px;
      font-size: 15px; font-weight: 700;
      text-decoration: none;
    }

    .korzina-list {
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 24px;
    }
    .korzina-row {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .korzina-row__emoji { font-size: 40px; flex-shrink: 0; }
    .korzina-row__info  { flex: 1; }
    .korzina-row__name  { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .korzina-row__price { font-size: 13px; color: var(--text-muted); }
    .korzina-row__total { font-size: 15px; font-weight: 800; color: var(--text); }

    .korzina-qty {
      display: flex; align-items: center; gap: 10px;
    }
    .korzina-qty-btn {
      width: 32px; height: 32px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--purple);
      transition: all .15s;
    }
    .korzina-qty-btn:hover {
      border-color: var(--purple);
      background: var(--purple-light);
    }
    .korzina-qty-num {
      font-size: 16px; font-weight: 700;
      min-width: 24px; text-align: center;
    }

    .korzina-summary {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .korzina-summary__row {
      display: flex; justify-content: space-between;
      font-size: 14px; color: var(--text-muted);
      margin-bottom: 10px;
    }
    .korzina-summary__row--total {
      font-size: 18px; font-weight: 800;
      color: var(--text);
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-bottom: 18px;
    }
    .korzina-order-btn {
      width: 100%; padding: 16px;
      border-radius: 12px; border: none;
      background: var(--purple);
      color: white;
      font-size: 16px; font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .korzina-order-btn:hover { background: var(--purple-mid); }
    .korzina-order-btn:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <a class="logo" href="Index.html">
      <div class="logo-icon">A</div>
      <div class="logo-text">Afzal <span>Tezkor</span></div>
    </a>

    <button class="location-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      Ташкент
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>

    <nav class="header-nav">
      <a class="nav-btn" href="Index.html" style="margin-left: 600px;"  >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Главная
      </a>
      <a class="nav-btn active" href="Korzina.html" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge" id="cart-count" style="display:none">0</span>
        Корзина
      </a>
    </nav>
  </div>
</header>

<!-- ── СОДЕРЖИМОЕ КОРЗИНЫ ── -->
<div class="korzina-wrap">
  <div class="korzina-title">🛒 Моя корзина</div>
  <div id="korzina-content"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
(function () {
  const STORAGE_KEY = 'uzum_cart';

  function loadCart() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveCart(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
  }
  function fmt(n) {
    return n.toLocaleString('ru-RU') + ' сум';
  }

  function totalCount() {
    return Object.values(loadCart()).reduce((s, i) => s + i.qty, 0);
  }

  function updateHeaderBadge() {
    const badge = document.getElementById('cart-count');
    if (!badge) return;
    const count = totalCount();
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }

  function changeQty(id, delta) {
    const cart = loadCart();
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    saveCart(cart);
    render();
    updateHeaderBadge();
  }

  function render() {
    const cart    = loadCart();
    const keys    = Object.keys(cart);
    const content = document.getElementById('korzina-content');

    if (keys.length === 0) {
      content.innerHTML = `
        <div class="korzina-empty">
          <div class="korzina-empty__icon">🛒</div>
          <div class="korzina-empty__text">Корзина пуста</div>
          <div class="korzina-empty__sub">Добавьте что-нибудь из меню</div>
          <a class="korzina-empty__btn" href="Index.html">На главную</a>
        </div>`;
      return;
    }

const subtotal = Object.values(cart).reduce((s, i) => {
  const price = i.fromBellissimo ? Math.round(i.price * 0.85) : i.price;
  return s + price * i.qty;
}, 0);
const delivery = 0;
const total    = subtotal + delivery;

const rows = keys.map(id => {
  const item = cart[id];
  const imgSrc = item.emoji || item.img || '';
  const discounted = !!item.fromBellissimo;
  const finalPrice = discounted ? Math.round(item.price * 0.85) : item.price;

  return `
    <div class="korzina-row">
      <div class="korzina-row__emoji" style="width:50px;height:50px;flex-shrink:0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;">
        <img src="${imgSrc}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;" />
      </div>
      <div class="korzina-row__info">
        <div class="korzina-row__name">${item.name}</div>
        <div class="korzina-row__price">
          ${discounted
            ? `<span style="text-decoration:line-through;color:#aaa;margin-right:5px">${fmt(item.price)}</span>
               <span style="color:#e53e3e;font-weight:700">${fmt(finalPrice)}</span>
               <span style="background:#fff0f0;color:#e53e3e;font-size:11px;font-weight:700;padding:1px 5px;border-radius:5px;margin-left:4px">−15%</span>`
            : fmt(finalPrice)
          } × ${item.qty}
        </div>
      </div>
      <div class="korzina-qty">
        <button class="korzina-qty-btn" data-id="${id}" data-delta="-1">−</button>
        <span class="korzina-qty-num">${item.qty}</span>
        <button class="korzina-qty-btn" data-id="${id}" data-delta="1">+</button>
      </div>
      <div class="korzina-row__total">${fmt(finalPrice * item.qty)}</div>
    </div>`;
}).join('');

    content.innerHTML = `
      <div class="korzina-list">${rows}</div>
      <div class="korzina-summary">
        <div class="korzina-summary__row">
          <span>Товары (${totalCount()} шт.)</span>
          <span>${fmt(subtotal)}</span>
        </div>
        <div class="korzina-summary__row">
          <span>Доставка</span>
          <span style="color:var(--green); font-weight:600">Бесплатно</span>
        </div>
        <div class="korzina-summary__row korzina-summary__row--total">
          <span>Итого</span>
          <span>${fmt(total)}</span>
        </div>
        <button class="korzina-order-btn" id="orderBtn">Оформить заказ</button>
      </div>`;

    // события на кнопки ± 
    content.querySelectorAll('.korzina-qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        changeQty(btn.dataset.id, Number(btn.dataset.delta));
      });
    });

    // кнопка заказа
    document.getElementById('orderBtn').addEventListener('click', () => {
      showToast('✅ Заказ оформлен! Ожидайте доставку 25–35 мин');
      localStorage.removeItem(STORAGE_KEY);
      setTimeout(() => render(), 2100);
      updateHeaderBadge();
    });
  }

  /* тост */
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
  updateHeaderBadge();
})();
</script>
</body>
</html>
