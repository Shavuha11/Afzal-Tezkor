<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Oqtepa Lavash — Afzal Tezkor</title>
  <link rel="stylesheet" href="../Style.css" />
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="ut-header">
  <div class="ut-header__inner">
    <!-- Back -->
    <button class="ut-header__back" onclick="history.back()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    </button>

    <!-- Logo -->
    <a href="#" class="ut-header__logo">
      <div class="ut-logo-icon">A</div>
      <span class="ut-logo-name">Afzal <span>Tezkor</span></span>
    </a>

    <!-- Location -->
    <button class="ut-header__location">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Ташкент, Юнусабад
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <div class="ut-header__spacer"></div>

    <!-- Nav -->
    <nav class="ut-header__nav">
      <a href="../Korzina.html" class="ut-nav-btn ut-nav-btn--cart" id="ut-cartNavBtn">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Корзина</span>
        <span class="ut-cart-badge" id="ut-cartBadge" style="display:none">0</span>
      </a>
    </nav>
  </div>
</header>

<!-- ══ RESTAURANT HERO ══ -->
<div class="ut-hero">
  <div class="ut-hero__cover">
    <div class="ut-hero__emoji">🫓</div>
  </div>
  <div class="ut-hero__info">
    <div class="ut-hero__body">
      <div class="ut-hero__badge-row">
        <span class="ut-badge ut-badge--open">Открыто</span>
        <span class="ut-badge ut-badge--promo">−15% на первый заказ</span>
      </div>
      <h1 class="ut-hero__name">Max Way</h1>
      <div class="ut-hero__meta">
        <span class="ut-star-row">
          <svg width="14" height="14" fill="#F59E0B" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          4.6
        </span>
        <span class="ut-dot"></span>
        <span>15-25 мин</span>
        <span class="ut-dot"></span>
        <span>3 000 сум</span>
        <span class="ut-dot"></span>
        <span>Мин. заказ 35 000 сум</span>
      </div>
      <p class="ut-hero__desc">Свежие лаваши, шаурма, хот-доги и напитки. Готовим быстро из натуральных ингредиентов.</p>
    </div>
  </div>
</div>

<!-- ══ STICKY CATEGORY TABS ══ -->
<div class="ut-tabs-wrap" id="ut-tabsWrap">
  <div class="ut-tabs" id="ut-tabs">
    <button class="ut-tab ut-tab--active" data-cat="all">Все</button>
    <button class="ut-tab" data-cat="club-sandwich">Клаб-Сендвич</button>
    <button class="ut-tab" data-cat="burger">Бургеры</button>
    <button class="ut-tab" data-cat="doner">Донеры</button>
    <button class="ut-tab" data-cat="drinks">Напитки</button>
    <button class="ut-tab" data-cat="sauces">Соусы</button>
    <button class="ut-tab" data-cat="snacks">Снеки</button>
  </div>
</div>

<!-- ══ MENU ══ -->
<main class="ut-main">

  <!-- Лаваши -->
  <section class="ut-section" data-section="club-sandwich">
    <h2 class="ut-section__title">🥪 Клаб-Сендвич</h2>
    <div class="ut-grid" id="club-sandwich-grid"></div>
  </section>

  <!-- Шаурма -->
  <section class="ut-section" data-section="burger">
    <h2 class="ut-section__title">🍔 Бургеры</h2>
    <div class="ut-grid" id="burger-grid"></div>
  </section>

  <!-- Хот-доги -->
  <section class="ut-section" data-section="doner">
    <h2 class="ut-section__title">🥙 Донеры</h2>
    <div class="ut-grid" id="doner-grid"></div>
  </section>

  <!-- Напитки -->
  <section class="ut-section" data-section="drinks">
    <h2 class="ut-section__title">🥤 Напитки</h2>
    <div class="ut-grid" id="drinks-grid"></div>
  </section>

  <!--Соусы-->
  <section class="ut-section" data-section="sauces">
    <h2 class="ut-section__title">🫙 Соусы</h2>
    <div class="ut-grid" id="sauces-grid"></div>
  </section>

  <section class="ut-section" data-section="snacks">
    <h2 class="ut-section__title">🍟 Снеки</h2>
    <div class="ut-grid" id="snacks-grid"></div>
  </section>

</main>

<!-- ══ CART DRAWER ══ -->
<div class="ut-cart-overlay" id="ut-cartOverlay">
  <div class="ut-cart-drawer" id="ut-cartDrawer">
    <div class="ut-cart-drawer__handle"></div>
    <div class="ut-cart-drawer__head">
      <h2 class="ut-cart-drawer__title">Корзина</h2>
      <button class="ut-cart-drawer__close" id="ut-cartClose">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ut-cart-drawer__list" id="ut-cartList"></div>
    <div class="ut-cart-drawer__foot">
      <div class="ut-cart-drawer__total">
        <span>Итого:</span>
        <span id="ut-cartTotal">0 сум</span>
      </div>
      <button class="ut-cart-drawer__order-btn">Оформить заказ</button>
    </div>
  </div>
</div>

<!-- ══ ITEM MODAL ══ -->
<div class="ut-modal-overlay" id="ut-modalOverlay">
  <div class="ut-modal" id="ut-modal">
    <div class="ut-modal__handle"></div>
    <div class="ut-modal__emoji"><img id="ut-modalEmoji" src="" alt="" style="width:100%; height:100%; object-fit:cover; border-radius:12px;"></div>    <h2 class="ut-modal__name" id="ut-modalName"></h2>
    <p class="ut-modal__desc" id="ut-modalDesc"></p>
    <p class="ut-modal__price" id="ut-modalPrice"></p>
    <div class="ut-modal__actions">
      <button class="ut-modal__close" id="ut-modalClose">Назад</button>
      <button class="ut-modal__add" id="ut-modalAdd">В корзину</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="ut-toast" id="ut-toast"></div>

<!-- ══ FLOATING CART BTN ══ -->
<div class="ut-float-cart" id="ut-floatCart" style="display:none">
  <button class="ut-float-cart__btn" id="ut-floatCartBtn">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span id="ut-floatLabel">Корзина</span>
    <span id="ut-floatPrice"></span>
  </button>
</div>

<script src="../Restaurants_js/Max_way.js"></script>
</body>
</html>
